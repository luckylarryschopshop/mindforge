<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Idea Tracker</title>
  <style>
    body { font-family: sans-serif; background: #121212; color: #eee; margin: 0; padding: 20px; }
    h1 { text-align: center; }
    form { display: flex; gap: 10px; margin: 20px 0; }
    input, button { padding: 10px; border: none; border-radius: 4px; font-size: 16px; }
    input { flex: 1; background: #1e1e1e; color: #eee; }
    button { background: #007bff; color: white; cursor: pointer; }
    button:hover { background: #0056b3; }
    ul { list-style: none; padding: 0; }
    li { background: #1e1e1e; padding: 10px; margin-bottom: 10px; border-radius: 4px; }
  </style>
</head>
<body>
  <h1>Idea Tracker</h1>
  <form id="ideaForm">
    <input type="text" id="ideaInput" placeholder="Enter a new idea" required>
    <button type="submit">Add</button>
  </form>
  <ul id="ideaList"></ul>

  <script>
    const form = document.getElementById('ideaForm');
    const input = document.getElementById('ideaInput');
    const list = document.getElementById('ideaList');

    form.addEventListener('submit', function(e) {
      e.preventDefault();
      const idea = input.value.trim();
      if (idea) {
        const li = document.createElement('li');
        li.textContent = idea;
        list.appendChild(li);
        input.value = '';
        input.focus();
      }
    });
  </script>
</body>
</html>
