<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Idea Tracker</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    header {
      padding: 1rem;
      background-color: #1e293b;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    .search-bar {
      display: flex;
      gap: 0.5rem;
    }
    .search-bar input {
      padding: 0.5rem;
      border: none;
      background-color: #1e293b;
      color: #e6edf3;
      border-radius: 4px;
    }
    .add-form {
      padding: 1rem;
      background-color: #1e293b;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    .add-form input {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background-color: #1e293b;
      color: #e6edf3;
      border-radius: 4px;
    }
    .add-form button {
      padding: 0.5rem 1rem;
      background-color: #f97316;
      color: #0d1117;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .ideas {
      padding: 1rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    .idea-card {
      background-color: #1e293b;
      padding: 1rem;
      border-radius: 4px;
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
    }
    .idea-card .title {
      font-weight: bold;
    }
    .idea-card .timestamp {
      font-size: 0.8rem;
      color: #64748b;
    }
    .idea-card .buttons {
      display: flex;
      gap: 0.5rem;
    }
    .idea-card .buttons button {
      padding: 0.3rem 0.6rem;
      background-color: transparent;
      color: #f97316;
      border: none;
      cursor: pointer;
    }
    .idea-card .buttons button:hover {
      text-decoration: underline;
    }
    .empty-state {
      text-align: center;
      padding: 2rem;
      color: #64748b;
    }
  </style>
</head>
<body>
  <header>
    <h1>Idea Tracker</h1>
    <div class="search-bar">
      <input type="text" id="searchInput" placeholder="Search ideas..." />
    </div>
  </header>
  <div class="add-form">
    <input type="text" id="titleInput" placeholder="Title" />
    <input type="text" id="descriptionInput" placeholder="Description" />
    <button onclick="addIdea()">Add</button>
  </div>
  <div class="ideas" id="ideasContainer">
    <div class="empty-state">No ideas yet. Add one above!</div>
  </div>

  <script>
    const apiBase = '/api/mindforge';

    async function fetchIdeas() {
      const response = await fetch(apiBase);
      const ideas = await response.json();
      renderIdeas(ideas);
    }

    async function fetchSearch(terms) {
      const response = await fetch(`${apiBase}/search?q=${encodeURIComponent(terms)}`);
      const ideas = await response.json();
      renderIdeas(ideas);
    }

    function renderIdeas(ideas) {
      const container = document.getElementById('ideasContainer');
      container.innerHTML = '';
      if (ideas.length === 0) {
        container.innerHTML = '<div class="empty-state">No ideas found.</div>';
        return;
      }
      ideas.forEach(idea => {
        const card = document.createElement('div');
        card.className = 'idea-card';
        card.innerHTML = `
          <div class="title">${idea.title}</div>
          <div class="description">${idea.description}</div>
          <div class="timestamp">${new Date(idea.timestamp).toLocaleString()}</div>
          <div class="buttons">
            <button onclick="editIdea(${idea.id})">Edit</button>
            <button onclick="deleteIdea(${idea.id})">Delete</button>
          </div>
        `;
        container.appendChild(card);
      });
    }

    async function addIdea() {
      const title = document.getElementById('titleInput').value;
      const description = document.getElementById('descriptionInput').value;
      if (!title) return;
      const response = await fetch(apiBase, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ title, description })
      });
      if (response.ok) {
        document.getElementById('titleInput').value = '';
        document.getElementById('descriptionInput').value = '';
        fetchIdeas();
      }
    }

    async function editIdea(id) {
      const idea = await (await fetch(`${apiBase}/${id}`)).json();
      const title = prompt('Edit title:', idea.title);
      const description = prompt('Edit description:', idea.description);
      if (title !== null && description !== null) {
        await fetch(`${apiBase}/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, description })
        });
        fetchIdeas();
      }
    }

    async function deleteIdea(id) {
      if (confirm('Are you sure?')) {
        await fetch(`${apiBase}/${id}`, { method: 'DELETE' });
        fetchIdeas();
      }
    }

    document.getElementById('searchInput').addEventListener('input', (e) => {
      fetchSearch(e.target.value);
    });

    fetchIdeas();
  </script>
</body>
</html>
